<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบสำรวจครุภัณฑ์ - อายุรกรรมชาย 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        :root { --primary-blue: #1e40af; --accent-emerald: #10b981; --accent-amber: #f59e0b; }
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: #ffffff; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .spinner { width: 50px; height: 50px; border: 4px dashed var(--primary-blue); border-radius: 50%; animation: spin 1.5s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .form-input { width: 100%; padding: 1rem; border-radius: 1rem; border: 1px solid #cbd5e1; background-color: #ffffff; transition: all 0.2s; outline: none; }
        .form-input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1); }
        .btn-primary { background-color: var(--primary-blue); color: white; padding: 1.25rem; border-radius: 1rem; font-weight: 600; width: 100%; transition: all 0.2s; box-shadow: 0 4px 12px rgba(30, 64, 175, 0.2); }
        .image-preview { width: 100%; max-height: 250px; object-fit: contain; border-radius: 1rem; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .nav-item.active { color: var(--primary-blue); }
        .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-20">

    <!-- Loader Overlay -->
    <div id="loader" class="loader-overlay hidden">
        <div class="spinner mb-4"></div>
        <p id="loaderText" class="text-blue-900 font-bold">กำลังดำเนินการ...</p>
    </div>

    <!-- Header -->
    <header class="bg-blue-800 text-white sticky top-0 z-40 shadow-lg">
        <div class="max-w-4xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white/20 p-2 rounded-lg"><i class="fa-solid fa-boxes-stacked text-xl"></i></div>
                <div>
                    <h1 id="pageTitle" class="text-lg font-bold leading-tight">บันทึกครุภัณฑ์</h1>
                    <p class="text-[10px] text-blue-200 uppercase">Male Med 1 Inventory</p>
                </div>
            </div>
            <!-- ปุ่มรีเฟรชหน้าประวัติ -->
            <button id="refreshBtn" onclick="fetchHistoryFromServer()" class="p-2 hover:bg-white/10 rounded-full transition-colors hidden">
                <i class="fa-solid fa-rotate"></i>
            </button>
            <button id="resetFormBtn" onclick="resetForm()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow max-w-2xl mx-auto w-full p-4">
        <!-- Section: Form -->
        <section id="page-form" class="space-y-4">
            <form id="inventoryForm" class="glass-card p-6 space-y-6">
                <input type="hidden" id="editIndex" value="-1">
                <input type="hidden" id="existingImageUrl" value="-">
                
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-600 flex items-center"><i class="fa-solid fa-tag mr-2 text-blue-500"></i>ประเภทครุภัณฑ์</label>
                    <select id="assetType" required class="form-input appearance-none">
                        <option value="" disabled selected>เลือกประเภท...</option>
                        <option value="11-ครุภัณฑ์สำนักงาน">11-ครุภัณฑ์สำนักงาน</option>
                        <option value="12-ครุภัณฑ์วิทยาศาสตร์และการแพทย์">12-ครุภัณฑ์วิทยาศาสตร์และการแพทย์</option>
                        <option value="13-ครุภัณฑ์คอมพิวเตอร์">13-ครุภัณฑ์คอมพิวเตอร์</option>
                        <option value="14-ครุภัณฑ์ไฟฟ้าและวิทยุ">14-ครุภัณฑ์ไฟฟ้าและวิทยุ</option>
                        <option value="15-ครุภัณฑ์งานบ้านงานครัว">15-ครุภัณฑ์งานบ้านงานครัว</option>
                        <option value="16-ครุภัณฑ์โฆษณาและเผยแพร่">16-ครุภัณฑ์โฆษณาและเผยแพร่</option>
                        <option value="18-ครุภัณฑ์การศึกษา">18-ครุภัณฑ์การศึกษา</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600">เลขครุภัณฑ์</label>
                        <input type="text" id="assetNumber" required placeholder="เช่น 1234-567-89" class="form-input">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600">Asset ID</label>
                        <input type="text" id="assetId" required placeholder="ID ระบบคอมพิวเตอร์" class="form-input">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-600">รายการ (ชื่อครุภัณฑ์)</label>
                    <input type="text" id="assetName" required placeholder="เช่น เตียงผู้ป่วย" class="form-input">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-600">ยี่ห้อ (Brand)</label>
                    <input type="text" id="brand" placeholder="ระบุยี่ห้อ" class="form-input">
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-slate-600">สถานะปัจจุบัน</label>
                    <div class="status-grid">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="status" value="ใช้งานปกติ" checked class="hidden peer">
                            <div class="p-2.5 text-center border rounded-xl peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 transition-all text-[12px] h-full flex items-center justify-center">ใช้งานปกติ</div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="status" value="ชำรุด" class="hidden peer">
                            <div class="p-2.5 text-center border rounded-xl peer-checked:bg-rose-50 peer-checked:border-rose-500 peer-checked:text-rose-700 transition-all text-[12px] h-full flex items-center justify-center">ชำรุด</div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="status" value="ส่งคืนคลัง" class="hidden peer">
                            <div class="p-2.5 text-center border rounded-xl peer-checked:bg-amber-50 peer-checked:border-amber-500 peer-checked:text-amber-700 transition-all text-[12px] h-full flex items-center justify-center">ส่งคืนคลัง</div>
                        </label>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-slate-600 flex justify-between items-center">
                        <span>แนบรูปครุภัณฑ์</span>
                    </label>
                    <div id="previewContainer" class="w-full hidden mb-4 text-center">
                        <img id="imgPreview" src="#" alt="Preview" class="image-preview mx-auto">
                        <button type="button" onclick="removeImage()" class="w-full text-xs text-rose-500 mt-2 font-bold uppercase tracking-wider p-2">ลบรูปภาพออก</button>
                    </div>
                    <label id="uploadBox" class="w-full h-32 border-2 border-dashed border-slate-300 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 transition-colors">
                        <i class="fa-solid fa-camera text-3xl text-slate-400 mb-2"></i>
                        <span class="text-xs text-slate-500">ถ่ายรูป หรือ เลือกรูปภาพ</span>
                        <input type="file" id="assetPhoto" accept="image/*" capture="environment" class="hidden">
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary mt-4 flex justify-center items-center">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i>
                    <span id="btnText">บันทึกข้อมูลลง Google Sheet</span>
                </button>
                <button type="button" id="cancelEditBtn" onclick="resetForm()" class="hidden w-full py-3 text-slate-500 text-sm font-bold">ยกเลิกการแก้ไข</button>
            </form>
        </section>

        <!-- Section: Shared History -->
        <section id="page-history" class="hidden space-y-4">
            <div class="flex justify-between items-center px-2">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">ประวัติการลงข้อมูลทั้งหมด</span>
            </div>
            <div id="historyList" class="space-y-3 pb-4">
                <!-- ข้อมูลจะถูกดึงมาแสดงที่นี่ -->
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 h-16 flex items-center justify-around px-6 z-50">
        <button onclick="switchPage('form')" id="nav-form" class="nav-item active flex flex-col items-center space-y-1 transition-all">
            <i class="fa-solid fa-pen-to-square text-xl"></i>
            <span class="text-[10px] font-bold">บันทึก</span>
        </button>
        <button onclick="switchPage('history')" id="nav-history" class="nav-item text-slate-400 flex flex-col items-center space-y-1 transition-all">
            <i class="fa-solid fa-list-check text-xl"></i>
            <span class="text-[10px] font-bold">ประวัติรวม</span>
        </button>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 hidden w-[90%] max-w-xs">
        <div id="toastInner" class="px-6 py-3 rounded-full shadow-lg text-white text-sm font-bold flex items-center justify-center">
            <span id="toastText"></span>
        </div>
    </div>

    <script>
        // เปลี่ยนเป็น URL ของ Google Apps Script ที่คุณ Deploy ล่าสุด
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzl4OrWN40M37jMvMkChIw3nnO16n9sH-OOAJOIPMwS_-_xOWndlonJipTo1uIAXDps/exec"; 

        let historyData = [];

        window.onload = () => {
            setupListeners();
        };

        function setupListeners() {
            document.getElementById('assetPhoto').addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (file) {
                    setLoader(true, "กำลังประมวลผลรูปภาพ...");
                    try {
                        const base64 = await fileToBase64(file);
                        showPreview(base64);
                    } catch (err) {
                        showToast("โหลดรูปภาพไม่สำเร็จ", "error");
                    } finally {
                        setLoader(false);
                    }
                }
            });
            document.getElementById('inventoryForm').addEventListener('submit', handleFormSubmit);
        }

        // ฟังก์ชันดึงข้อมูลจาก Server (Google Sheet)
        async function fetchHistoryFromServer() {
            setLoader(true, "กำลังดึงข้อมูลจาก Sheet...");
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "fetch" })
                });
                const result = await response.json();
                if (result.result === "success") {
                    historyData = result.data;
                    renderHistory();
                } else {
                    throw new Error(result.error || "เกิดข้อผิดพลาดในการโหลด");
                }
            } catch (err) {
                showToast("โหลดข้อมูลล้มเหลว: " + err.message, "error");
            } finally {
                setLoader(false);
            }
        }

        function formatDriveUrl(url) {
            if (!url || url === "-" || url.includes("Error")) return "";
            if (url.includes("drive.google.com")) {
                const fileId = url.match(/[-\w]{25,}/);
                if (fileId) return `https://lh3.googleusercontent.com/d/${fileId}=s1000`;
            }
            return url;
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const editIdx = parseInt(document.getElementById('editIndex').value);
            const currentImgSrc = document.getElementById('imgPreview').src;
            
            let photoData = "";
            if (currentImgSrc.startsWith('data:')) {
                photoData = currentImgSrc;
            }

            const formData = {
                timestamp: editIdx === -1 ? new Date().toLocaleString('th-TH') : historyData[editIdx].timestamp,
                type: document.getElementById('assetType').value,
                assetNumber: document.getElementById('assetNumber').value,
                assetId: document.getElementById('assetId').value,
                assetName: document.getElementById('assetName').value,
                brand: document.getElementById('brand').value || "-",
                status: document.querySelector('input[name="status"]:checked').value,
                photo: photoData, 
                existingImageUrl: document.getElementById('existingImageUrl').value
            };

            setLoader(true, "กำลังบันทึกข้อมูล...");
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });
                const result = await response.json();
                
                if (result.result === "success") {
                    showToast("บันทึกสำเร็จ!", "success");
                    resetForm();
                    switchPage('history'); // บันทึกเสร็จแล้วไปดูหน้าประวัติที่อัปเดตใหม่
                } else {
                    throw new Error(result.error || "บันทึกไม่สำเร็จ");
                }
            } catch (err) {
                showToast("ผิดพลาด: " + err.message, "error");
            } finally {
                setLoader(false);
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (historyData.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-slate-400">ไม่พบข้อมูลในระบบ</div>`;
                return;
            }
            list.innerHTML = historyData.map((item, idx) => {
                let statusColor = 'border-l-emerald-500';
                let statusBadge = 'bg-emerald-100 text-emerald-600';
                if(item.status === 'ชำรุด') {
                    statusColor = 'border-l-rose-500';
                    statusBadge = 'bg-rose-100 text-rose-600';
                } else if(item.status === 'ส่งคืนคลัง') {
                    statusColor = 'border-l-amber-500';
                    statusBadge = 'bg-amber-100 text-amber-600';
                }

                const displayPhoto = formatDriveUrl(item.photo);

                return `
                <div class="glass-card p-4 space-y-3 border-l-4 ${statusColor}">
                    <div class="flex space-x-4">
                        <div class="w-20 h-20 bg-slate-100 rounded-xl overflow-hidden flex-shrink-0 border flex items-center justify-center">
                            ${displayPhoto ? 
                                `<img src="${displayPhoto}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150?text=Error';">` : 
                                `<div class="text-slate-300 text-2xl"><i class="fa-solid fa-image"></i></div>`
                            }
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-bold text-sm leading-tight mb-1 text-slate-800">${item.assetName}</h3>
                            <p class="text-[11px] text-slate-500 mb-1">เลข: ${item.assetNumber}</p>
                            <div class="flex items-center space-x-2">
                                <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${statusBadge}">${item.status}</span>
                            </div>
                            <p class="text-[9px] text-slate-400 mt-2"><i class="fa-regular fa-clock mr-1"></i>${item.timestamp}</p>
                        </div>
                    </div>
                    <div class="flex border-t pt-2 gap-2">
                        <button onclick="editHistory(${idx})" class="flex-grow py-2 text-xs font-bold text-blue-600 bg-blue-50 rounded-lg active:scale-95"><i class="fa-solid fa-pen-to-square mr-1"></i> แก้ไข</button>
                        <button onclick="deleteHistory(${idx})" class="flex-grow py-2 text-xs font-bold text-rose-600 bg-rose-50 rounded-lg active:scale-95"><i class="fa-solid fa-trash-can mr-1"></i> ลบ</button>
                    </div>
                </div>
            `}).join('');
        }

        function editHistory(index) {
            const item = historyData[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('assetType').value = item.type;
            document.getElementById('assetNumber').value = item.assetNumber;
            document.getElementById('assetId').value = item.assetId;
            document.getElementById('assetName').value = item.assetName;
            document.getElementById('brand').value = (item.brand === "-" || !item.brand) ? "" : item.brand;
            
            const statusRadios = document.getElementsByName('status');
            for(let r of statusRadios) { if(r.value === item.status) r.checked = true; }

            if (item.photo && item.photo !== "-") {
                showPreview(formatDriveUrl(item.photo));
                document.getElementById('existingImageUrl').value = item.photo;
            } else {
                removeImage();
            }

            document.getElementById('btnText').innerText = "อัปเดตข้อมูล (บันทึกทับ)";
            document.getElementById('pageTitle').innerText = "แก้ไขข้อมูลครุภัณฑ์";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            switchPage('form');
        }

        async function deleteHistory(index) {
            const item = historyData[index];
            if (!confirm(`ยืนยันการลบ ${item.assetName} ออกจาก Sheet ใช่หรือไม่?`)) return;
            setLoader(true, "กำลังลบจากระบบ...");
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "delete", assetId: item.assetId })
                });
                const result = await response.json();
                if (result.result === "success") {
                    showToast("ลบข้อมูลสำเร็จ!", "success");
                    fetchHistoryFromServer();
                } else { throw new Error(result.message); }
            } catch (err) { showToast("ลบไม่สำเร็จ: " + err.message, "error"); } finally { setLoader(false); }
        }

        function switchPage(page) {
            const isForm = page === 'form';
            document.getElementById('page-form').classList.toggle('hidden', !isForm);
            document.getElementById('page-history').classList.toggle('hidden', isForm);
            document.getElementById('nav-form').classList.toggle('active', isForm);
            document.getElementById('nav-history').classList.toggle('active', !isForm);
            document.getElementById('refreshBtn').classList.toggle('hidden', isForm);
            document.getElementById('resetFormBtn').classList.toggle('hidden', !isForm);

            if (!isForm) {
                fetchHistoryFromServer(); // ดึงข้อมูลใหม่ทุกครั้งที่กดหน้าประวัติรวม
                document.getElementById('pageTitle').innerText = "ประวัติรวม (Real-time)";
            } else {
                if(document.getElementById('editIndex').value === "-1") {
                    document.getElementById('pageTitle').innerText = "บันทึกครุภัณฑ์";
                }
            }
        }

        function setLoader(show, text) {
            document.getElementById('loader').classList.toggle('hidden', !show);
            document.getElementById('loaderText').innerText = text;
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            document.getElementById('toastText').innerText = msg;
            document.getElementById('toastInner').className = `px-6 py-3 rounded-full shadow-lg text-white text-sm font-bold ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = e => resolve(e.target.result);
                reader.onerror = error => reject(error);
            });
        }

        function showPreview(src) {
            const img = document.getElementById('imgPreview');
            img.src = src;
            document.getElementById('previewContainer').classList.remove('hidden');
            document.getElementById('uploadBox').classList.add('hidden');
        }

        function removeImage() {
            document.getElementById('imgPreview').src = "#";
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('uploadBox').classList.remove('hidden');
            document.getElementById('existingImageUrl').value = "-";
            document.getElementById('assetPhoto').value = ""; 
        }

        function resetForm() {
            document.getElementById('inventoryForm').reset();
            document.getElementById('editIndex').value = "-1";
            document.getElementById('existingImageUrl').value = "-";
            document.getElementById('btnText').innerText = "บันทึกข้อมูลลง Google Sheet";
            document.getElementById('pageTitle').innerText = "บันทึกครุภัณฑ์";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            removeImage();
        }
    </script>
</body>
</html>
